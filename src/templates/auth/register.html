{% extends "auth/base.html" %}
{% block title %}Create account · Pulse{% endblock %}
{% block topright %}Have an account? <a href="/login/" class="text-brand-400 font-semibold hover:underline">Sign in</a>{% endblock %}

{% block card %}
<div x-data="registerForm()">
  <h1 class="text-2xl font-extrabold tracking-tight">Create your account</h1>
  <p class="text-ink2 mt-1 text-sm">Start messaging in real time — it's free.</p>

  <form @submit.prevent="submit()" class="space-y-4 mt-7" novalidate>
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="text-xs font-medium text-ink2">First name</label>
        <div class="field mt-1.5 px-3.5 h-12 rounded-xl bg-white/[.04] border hairline flex items-center">
          <input x-model="first_name" placeholder="Ada" class="w-full bg-transparent outline-none text-sm"/>
        </div>
      </div>
      <div>
        <label class="text-xs font-medium text-ink2">Last name</label>
        <div class="field mt-1.5 px-3.5 h-12 rounded-xl bg-white/[.04] border hairline flex items-center">
          <input x-model="last_name" placeholder="Lovelace" class="w-full bg-transparent outline-none text-sm"/>
        </div>
      </div>
    </div>

    <div>
      <label class="text-xs font-medium text-ink2">Email</label>
      <div class="field mt-1.5 flex items-center gap-2 px-3.5 h-12 rounded-xl bg-white/[.04] border hairline">
        <svg class="w-4 h-4 text-ink2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/></svg>
        <input x-model="email" type="email" autocomplete="email" placeholder="you@company.com" class="flex-1 bg-transparent outline-none text-sm"/>
      </div>
    </div>

    <div>
      <label class="text-xs font-medium text-ink2">Password</label>
      <div class="field mt-1.5 flex items-center gap-2 px-3.5 h-12 rounded-xl bg-white/[.04] border hairline">
        <svg class="w-4 h-4 text-ink2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input x-model="password" @input="score=Pulse.strength(password)" :type="show?'text':'password'" autocomplete="new-password" placeholder="Create a strong password" class="flex-1 bg-transparent outline-none text-sm"/>
        <button type="button" @click="show=!show" class="text-ink2 hover:text-slate-100" x-html="eye(show)"></button>
      </div>
      <!-- strength meter -->
      <div x-show="password" x-transition class="mt-2">
        <div class="flex gap-1">
          <template x-for="i in 4" :key="i"><div class="h-1.5 flex-1 rounded-full transition-all" :class="i<=score ? barColor() : 'bg-white/10'"></div></template>
        </div>
        <p class="text-[11px] mt-1" :class="textColor()" x-text="label()"></p>
      </div>
    </div>

    <div>
      <label class="text-xs font-medium text-ink2">Confirm password</label>
      <div class="field mt-1.5 flex items-center gap-2 px-3.5 h-12 rounded-xl bg-white/[.04] border hairline">
        <svg class="w-4 h-4 text-ink2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input x-model="password2" :type="show?'text':'password'" autocomplete="new-password" placeholder="Repeat password" class="flex-1 bg-transparent outline-none text-sm"/>
        <template x-if="password2 && password2===password"><svg class="w-4 h-4 text-ok" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></template>
      </div>
    </div>

    <label class="flex items-start gap-2 text-xs text-ink2 select-none cursor-pointer">
      <input type="checkbox" x-model="agree" class="peer sr-only"/>
      <span class="grid place-items-center w-5 h-5 rounded-md border hairline bg-white/[.04] mt-px transition" :class="agree&&'!bg-brand !border-brand'"><svg x-show="agree" class="w-3 h-3 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>
      <span>I agree to the <a href="#" class="text-brand-400 hover:underline">Terms</a> and <a href="#" class="text-brand-400 hover:underline">Privacy Policy</a>.</span>
    </label>

    <p x-show="error" x-text="error" class="text-sm text-danger"></p>
    <button type="submit" :disabled="loading" class="btn-press w-full h-12 rounded-xl bg-brand hover:bg-brand-600 text-white font-semibold shadow-glow disabled:opacity-60 flex items-center justify-center gap-2">
      <svg x-show="loading" class="w-4 h-4 spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M21 12a9 9 0 1 1-6.2-8.5" stroke-linecap="round"/></svg>
      <span x-text="loading?'Creating account…':'Create account'"></span>
    </button>
  </form>
</div>
{% endblock %}

{% block script %}
<script>
function registerForm(){ return {
  first_name:'', last_name:'', email:'', password:'', password2:'', agree:false,
  show:false, loading:false, error:'', score:0,
  eye(s){ return s
    ? '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.9 4.24A9.1 9.1 0 0 1 12 4c7 0 10 8 10 8a13.2 13.2 0 0 1-1.67 2.68M6.6 6.6C3.6 8.3 2 12 2 12s3 8 10 8a9.1 9.1 0 0 0 5.4-1.6M1 1l22 22"/></svg>'
    : '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-8 10-8 10 8 10 8-3 8-10 8-10-8-10-8z"/><circle cx="12" cy="12" r="3"/></svg>'; },
  barColor(){ return ['bg-danger','bg-danger','bg-warn','bg-brand','bg-ok'][this.score]; },
  textColor(){ return ['text-danger','text-danger','text-warn','text-brand-400','text-ok'][this.score]; },
  label(){ return ['Too weak','Weak','Fair','Good','Strong'][this.score]; },
  async submit(){
    this.error='';
    if(!this.first_name || this.first_name.length<2){ this.error='First name must be at least 2 characters.'; return; }
    if(!this.email){ this.error='Please enter your email.'; return; }
    if(this.score<4){ this.error='Password needs 8+ chars with upper, lower, number and a symbol.'; return; }
    if(this.password!==this.password2){ this.error='Passwords do not match.'; return; }
    if(!this.agree){ this.error='Please accept the Terms to continue.'; return; }
    this.loading=true;
    const {ok,data} = await Pulse.post('/auth/register/', {
      first_name:this.first_name, last_name:this.last_name, email:this.email,
      password:this.password, password2:this.password2, otp_type:'otp'
    });
    this.loading=false;
    if(ok){
      Pulse.toast('Verification code sent to your email ✉️');
      setTimeout(()=>location.href='/verify/?email='+encodeURIComponent(this.email), 600);
    } else {
      this.error = Pulse.msg(data, 'Could not create account. Please try again.');
    }
  }
}}
</script>
{% endblock %}
