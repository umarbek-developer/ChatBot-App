# Nginx reverse proxy for ChatBot-App (Daphne ASGI on 127.0.0.1:8001).
# Handles plain HTTP + the WebSocket upgrade for /ws/ (chat & call), and serves
# static/media directly. Adjust server_name and the file paths for your server.

upstream chatbot_asgi {
    server 127.0.0.1:8001;
}

server {
    listen 80;
    server_name yourdomain.com;

    # Voice notes / media uploads — raise if you allow large files.
    client_max_body_size 25M;

    location = /favicon.ico { access_log off; log_not_found off; }

    # collectstatic writes to production STATIC_ROOT = <project>/src/static
    location /static/ {
        alias /srv/ChatBot-App/src/static/;
        expires 7d;
    }

    # MEDIA_ROOT = <project>/src/media
    location /media/ {
        alias /srv/ChatBot-App/src/media/;
    }

    # WebSocket endpoints: ws/chat/<room>/ and ws/call/
    location /ws/ {
        proxy_pass http://chatbot_asgi;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;   # keep long-lived sockets open
    }

    # Everything else (HTTP: API, admin, templates)
    location / {
        proxy_pass http://chatbot_asgi;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
}
